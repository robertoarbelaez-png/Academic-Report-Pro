<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Academic Report Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto p-8 max-w-2xl">
        <h1 class="text-3xl font-bold text-center mb-8">📄 Academic Report Pro</h1>
        
        <div class="bg-gray-800 rounded-lg p-6">
            <input type="text" id="tema" placeholder="Tema del informe" class="w-full p-3 rounded bg-gray-700 mb-4">
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="text" id="nombre" placeholder="Nombre" class="p-3 rounded bg-gray-700">
                <input type="text" id="asignatura" placeholder="Asignatura" class="p-3 rounded bg-gray-700">
            </div>
            
            <button onclick="generar()" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700">
                🚀 Generar Informe PDF
            </button>
        </div>
    </div>
    
    <script>
        async function generar() {
            const tema = document.getElementById('tema').value;
            if (!tema) {
                Swal.fire('Error', 'Ingresa un tema', 'error');
                return;
            }
            
            Swal.fire({ title: 'Generando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            try {
                const response = await fetch('/generar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        modo: 'rapido',
                        tema: tema,
                        nombre: document.getElementById('nombre').value,
                        asignatura: document.getElementById('asignatura').value
                    })
                });
                const result = await response.json();
                if (result.success) {
                    Swal.fire('¡Listo!', 'Informe generado', 'success').then(() => {
                        window.location.href = result.download_url;
                    });
                } else {
                    Swal.fire('Error', result.error, 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'No se pudo generar', 'error');
            }
        }
    </script>
</body>
</html>
