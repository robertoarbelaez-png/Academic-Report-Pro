<!DOCTYPE html>
<html>
<head>
<title>Academic Report Pro</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

<h1>📄 Academic Report Pro</h1>

<input id="tema" placeholder="Tema"><br><br>
<input id="nombre" placeholder="Nombre"><br><br>

<button onclick="generar()">Generar Informe</button>

<script>
async function generar(){
    let tema = document.getElementById('tema').value;

    if(!tema || tema.length < 3){
        Swal.fire('Error', 'Tema inválido', 'error');
        return;
    }

    Swal.fire({
        title: "Generando informe...",
        text: "Esto puede tardar unos segundos",
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    try {
        const res = await fetch('/generar',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                tema: tema,
                nombre: document.getElementById('nombre').value
            })
        });

        const data = await res.json();

        Swal.close();

        if(data.success){
            window.location.href = data.download_url;
        } else {
            Swal.fire('Error', data.error, 'error');
        }

    } catch (error) {
        Swal.close();
        Swal.fire('Error', 'Fallo en la conexión', 'error');
    }
}
</script>

</body>
</html>
