<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Academic Report Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

<div class="bg-gray-800 p-8 rounded-xl shadow-xl w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">📄 Academic Report Pro</h1>

    <input id="tema" placeholder="Tema..." class="w-full p-3 mb-4 rounded bg-gray-900 border border-gray-700">

    <button onclick="generar()" class="w-full bg-blue-600 p-3 rounded font-bold hover:bg-blue-700">
        Generar Informe
    </button>
</div>

<script>
async function generar() {
    const tema = document.getElementById("tema").value;

    if (!tema) {
        Swal.fire("Error", "Escribe un tema", "error");
        return;
    }

    Swal.fire({
        title: "Generando...",
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    const res = await fetch("/generar", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({tema})
    });

    const data = await res.json();

    if (data.success) {
        Swal.fire("Listo", "Descargando...", "success");
        window.location.href = data.download_url; // 🔥 descarga directa
    } else {
        Swal.fire("Error", data.error, "error");
    }
}
</script>

</body>
</html>
