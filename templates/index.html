<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Academic Report Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center">

<div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
    
    <h1 class="text-3xl font-bold text-white text-center mb-6">
        📄 Academic Report Pro
    </h1>

    <input id="tema" placeholder="Tema del informe"
        class="w-full p-3 mb-4 rounded-lg bg-gray-900 border border-gray-700 text-white">

    <button onclick="generar()"
        class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-700 font-bold text-white">
        🤖 Generar Informe
    </button>

</div>

<script>
async function generar() {
    const tema = document.getElementById("tema").value;

    if (!tema) {
        Swal.fire("Error", "Escribe un tema", "error");
        return;
    }

    Swal.fire({
        title: "Generando informe...",
        html: "La IA está trabajando ⏳",
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    try {
        const res = await fetch("/generar", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({tema})
        });

        const data = await res.json();

        Swal.close(); // 🔥 clave

        if (data.success) {
            window.location.href = data.download_url;

            setTimeout(() => {
                Swal.fire("✅ Listo", "Informe descargado", "success");
            }, 1000);

        } else {
            Swal.fire("Error", data.error, "error");
        }

    } catch {
        Swal.fire("Error", "Fallo del servidor", "error");
    }
}
</script>

</body>
</html>
