<!DOCTYPE html>
<html>
<head>
<title>Academic Report Pro</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

<h1>📄 Academic Report Pro</h1>

<input id="tema" placeholder="Tema"><br><br>
<input id="nombre" placeholder="Nombre"><br><br>

<button onclick="generar()">Generar Informe</button>

<script>
async function generar(){
    let tema = document.getElementById('tema').value;

    if(!tema || tema.length < 3){
        alert("Tema inválido");
        return;
    }

    const datos = {
        tema: tema,
        nombre: document.getElementById('nombre').value
    };

    Swal.fire({title:"Generando...", didOpen:()=>Swal.showLoading()});

    const res = await fetch('/generar',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(datos)
    });

    const data = await res.json();

    if(data.success){
        window.location.href = data.download_url;
    } else {
        alert(data.error);
    }
}
</script>

</body>
</html>
