<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Academic Report Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-xl w-96">
    <h1 class="text-2xl mb-4 text-center">📄 Generador de Informes</h1>

    <input id="tema" placeholder="Tema"
    class="w-full mb-3 p-2 rounded bg-gray-700">

    <input id="nombre" placeholder="Nombre"
    class="w-full mb-3 p-2 rounded bg-gray-700">

    <button onclick="generar()"
    class="w-full bg-blue-600 p-2 rounded">Generar</button>
</div>

<script>
async function generar(){
    const tema = document.getElementById('tema').value;

    Swal.fire({
        title:'Generando...',
        allowOutsideClick:false,
        didOpen:()=>Swal.showLoading()
    });

    const r = await fetch('/generar',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            tema:tema,
            nombre:document.getElementById('nombre').value
        })
    });

    const data = await r.json();

    if(data.success){
        Swal.close();
        window.location = data.download_url;
    }else{
        Swal.fire('Error',data.error,'error');
    }
}
</script>

</body>
</html>
