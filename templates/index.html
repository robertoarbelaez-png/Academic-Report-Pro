<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Report Pro</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-xl">

<h1 class="text-3xl font-bold text-center mb-6">📄 Academic Report Pro</h1>

<input id="tema" placeholder="Tema" class="w-full p-3 border rounded mb-3">
<input id="nombre" placeholder="Nombre" class="w-full p-3 border rounded mb-3">

<button onclick="generar()" class="w-full bg-blue-600 text-white py-3 rounded">
Generar Informe
</button>

<div id="preview" class="mt-6 hidden">
<h2 class="font-bold mb-2">Vista previa</h2>
<div id="contenidoPreview" class="bg-gray-100 p-3 rounded text-sm"></div>

<button id="descargarBtn" class="mt-3 w-full bg-green-600 text-white py-3 rounded">
Descargar PDF
</button>
</div>

</div>

<script>
let url = "";

async function generar(){
    let tema = document.getElementById('tema').value;

    Swal.fire({title:"Generando...", didOpen:()=>Swal.showLoading()});

    const res = await fetch('/generar',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            tema: tema,
            nombre: document.getElementById('nombre').value
        })
    });

    const data = await res.json();
    Swal.close();

    if(data.success){
        url = data.download_url;

        document.getElementById('contenidoPreview').innerHTML =
            "<p>Informe generado correctamente</p>";

        document.getElementById('preview').classList.remove('hidden');
    }
}

document.getElementById('descargarBtn').onclick = ()=>{
    window.open(url);
}
</script>

</body>
</html>
