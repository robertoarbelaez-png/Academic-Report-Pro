<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Academic Report Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow w-full max-w-xl">

<h1 class="text-2xl font-bold mb-4 text-center">⚡ Academic Report Pro</h1>

<input id="tema" placeholder="Tema" class="w-full p-3 border rounded mb-3">
<input id="nombre" placeholder="Nombre" class="w-full p-3 border rounded mb-3">

<button onclick="generar()" class="w-full bg-blue-600 text-white py-3 rounded">
Generar Informe
</button>

</div>

<script>
async function generar(){
    Swal.fire({title:"Generando PDF...", didOpen:()=>Swal.showLoading()});

    const res = await fetch('/generar',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            tema: document.getElementById('tema').value,
            nombre: document.getElementById('nombre').value
        })
    });

    const data = await res.json();
    Swal.close();

    if(data.success){
        window.open(data.download_url);
    }
}
</script>

</body>
</html>
