<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Informes</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="font-family: Arial; text-align:center; padding:40px;">

<h1>📄 Generador de Informes</h1>

<input id="tema" placeholder="Tema" style="padding:10px; width:300px;"><br><br>
<input id="nombre" placeholder="Tu nombre" style="padding:10px; width:300px;"><br><br>

<button onclick="generar()" style="padding:10px 20px;">Generar PDF</button>

<script>
async function generar() {
    let tema = document.getElementById('tema').value;
    let nombre = document.getElementById('nombre').value;

    if (!tema || tema.length < 3) {
        alert("Tema inválido");
        return;
    }

    Swal.fire({title: "Generando...", didOpen: () => Swal.showLoading()});

    const res = await fetch('/generar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({tema, nombre})
    });

    const data = await res.json();

    if (data.success) {
        window.location.href = data.download_url;
    } else {
        alert(data.error);
    }
}
</script>

</body>
</html>
